<!-- File: templates/admin/add_book.html -->
{% extends 'base.html' %}

{% block title %}Tambah Buku - Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="admin-sidebar">
                <h5 class="mb-3">Menu Admin</h5>
                <div class="list-group">
                    <a href="{{ url_for('admin_dashboard') }}" class="list-group-item list-group-item-action">
                        <i class="fas fa-dashboard me-2"></i>Dashboard
                    </a>
                    <a href="{{ url_for('admin_books') }}" class="list-group-item list-group-item-action">
                        <i class="fas fa-book me-2"></i>Kelola Buku
                    </a>
                    <a href="{{ url_for('admin_categories') }}" class="list-group-item list-group-item-action">
                        <i class="fas fa-tags me-2"></i>Kelola Kategori
                    </a>
                </div>
            </div>
        </div>
        
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Tambah Buku Baru</h2>
                <a href="{{ url_for('admin_books') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Kembali
                </a>
            </div>
            
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="judul" class="form-label">Judul Buku <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="judul" name="judul" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="penulis" class="form-label">Penulis <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="penulis" name="penulis" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="penerbit" class="form-label">Penerbit</label>
                                <input type="text" class="form-control" id="penerbit" name="penerbit">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="tahun_terbit" class="form-label">Tahun Terbit</label>
                                <input type="number" class="form-control" id="tahun_terbit" name="tahun_terbit" min="1900" max="2100">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="id_kategori" class="form-label">Kategori <span class="text-danger">*</span></label>
                                <select class="form-select" id="id_kategori" name="id_kategori" required>
                                    <option value="">Pilih Kategori</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id_kategori }}">{{ category.nama_kategori }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-12 mb-3">
                                <label for="deskripsi" class="form-label">Deskripsi</label>
                                <textarea class="form-control" id="deskripsi" name="deskripsi" rows="4"></textarea>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="file_buku" class="form-label">File PDF <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" id="file_buku" name="file_buku" accept=".pdf" required>
                                <small class="text-muted">Format: PDF, Maks: 50MB</small>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="cover" class="form-label">Cover Buku</label>
                                <input type="file" class="form-control" id="cover" name="cover" accept="image/*">
                                <small class="text-muted">Format: JPG, PNG, GIF</small>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary-custom">
                                <i class="fas fa-save me-2"></i>Simpan Buku
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
